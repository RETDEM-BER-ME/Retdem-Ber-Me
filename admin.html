<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retdem-Ber-Me | Admin Panel</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <main>
        <h1 style="text-align:center; margin-bottom:2rem;">User Management</h1>
        <div class="card" style="max-width:900px;margin:0 auto;">
            <nav class="user-tabs" style="display:flex;gap:1.5rem;justify-content:center;margin-bottom:2rem;">
                <button class="tab-btn active" data-tab="students">Students</button>
                <button class="tab-btn" data-tab="ci">Clinical Instructors</button>
                <button class="tab-btn" data-tab="dr">DR Personnels</button>
            </nav>
            <!-- Student Tab -->
            <section id="tab-students" class="user-tab-panel" style="display:block;">
                <div style="display:flex;gap:1rem;align-items:center;margin-bottom:1.2rem;flex-wrap:wrap;">
                    <input type="text" id="student-search" placeholder="Search by name..." style="max-width:220px;">
                    
                    <input type="text" id="student-id-search" placeholder="Search by ID..." style="max-width:180px;">
                    
                    <select id="student-year-filter" style="max-width:160px;">
                        <option value="">All Year Levels</option>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                    
                    <select id="student-sort" style="max-width:160px;">
                        <option value="asc">Sort: A-Z</option>
                        <option value="desc">Sort: Z-A</option>
                    </select>
                </div>
                <div id="student-list" class="user-list"></div>
            </section>
            
           <section id="tab-ci" class="user-tab-panel" style="display:none;">
                <div style="display:flex;gap:1rem;align-items:center;margin-bottom:1.2rem;flex-wrap:wrap;">
                    <input type="text" id="ci-search" placeholder="Search by name..." style="max-width:220px;">
                    <select id="ci-sort" style="max-width:160px;">
                        <option value="asc">Sort: A-Z</option>
                        <option value="desc">Sort: Z-A</option>
                    </select>
                </div>
                <div id="ci-list" class="user-list"></div>
            </section>

            <section id="tab-dr" class="user-tab-panel" style="display:none;">
                <div style="display:flex;gap:1rem;align-items:center;margin-bottom:1.2rem;flex-wrap:wrap;">
                    <input type="text" id="dr-search" placeholder="Search by name..." style="max-width:220px;">
                    <select id="dr-sort" style="max-width:160px;">
                        <option value="asc">Sort: A-Z</option>
                        <option value="desc">Sort: Z-A</option>
                    </select>
                </div>
                <div id="dr-list" class="user-list"></div>
            </section>
        </div>
    </main>
    <script type="module" src="admin.js"></script>
</body>
</html>
