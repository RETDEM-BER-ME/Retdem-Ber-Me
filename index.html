<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retdem-Ber-Me | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="index.css">

    <!-- Font Awesome for eye icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <div class="login-bg">
        <div class="login-glass">

            <header class="login-header-modern">
                <div class="login-logo-wrap">
                    <img src="retdem_logo.png" alt="RETDEM-BER-ME logo" class="login-logo">
                    <h1>Retdem-Ber-Me</h1>
                </div>
            </header>

            <div class="login-quote-modern">Your Checklist for Skills &amp; Supplies</div>
            <div class="login-desc-modern">Checklist and Borrowing Materials at your convenience.</div>

            <main class="login-main">

                <!-- LOGIN FORM -->
                <form id="login-form" class="login-form-modern">
                    <input type="email" id="log-email" placeholder="Email" required autocomplete="username">

                    <div class="password-field">
                        <input type="password" id="log-pass" placeholder="Password" required autocomplete="current-password">
                        <span class="toggle-password" onclick="togglePassword('log-pass', this)">
                            <i class="fa-solid fa-eye"></i>
                        </span>
                    </div>

                    <div class="remember-me-wrap">
                        <label class="remember-me-label">
                            <input type="checkbox" id="remember-me">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" id="forgot-password-link" class="forgot-password-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="login-btn-modern" id="login-btn">
                        Log in
                        <span class="spinner" style="display:none;"></span>
                    </button>

                    <div class="form-toggle-text-modern">
                        Don't have an account? <a href="#" id="show-signup">Sign Up</a>
                    </div>

                    <p class="auth-error-modern" role="alert" aria-live="polite"></p>
                </form>

                <!-- SIGNUP FORM -->
                <form id="signup-form" class="login-form-modern" style="display:none;">
                    <input type="email" id="sign-email" placeholder="Email" required autocomplete="username">

                    <div class="password-field">
                        <input type="password" id="sign-pass" placeholder="Password" required autocomplete="new-password">
                        <span class="toggle-password" onclick="togglePassword('sign-pass', this)">
                            <i class="fa-solid fa-eye"></i>
                        </span>
                    </div>

                    <input type="text" id="sign-name" placeholder="Last Name, First Name, MI." required>
                    <input type="text" id="sign-id" placeholder="Student ID (N/A if none)" required>

                    <select id="sign-year" required>
                        <option value="1st Yr">1st Year</option>
                        <option value="2nd Yr">2nd Year</option>
                        <option value="3rd Yr">3rd Year</option>
                        <option value="4th Yr">4th Year</option>
                        <option value="None">None</option>
                    </select>

                    <select id="sign-role" required>
                        <option value="student">Student</option>
                        <option value="ci">Clinical Instructor</option>
                        <option value="dr">DR Personnel</option>
                    </select>

                    <button type="submit" class="login-btn-modern" id="signup-btn">
                        Register
                        <span class="spinner" style="display:none;"></span>
                    </button>

                    <div class="form-toggle-text-modern">
                        Already have an account? <a href="#" id="show-login">Sign In</a>
                    </div>

                    <p id="auth-error" class="auth-error-modern" role="alert" aria-live="polite"></p>
                </form>

            </main>
        </div>
    </div>

    <script> /* Eye icon lng itu */
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);

            if (input.type === "password") {
                input.type = "text";
                icon.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
            } else {
                input.type = "password";
                icon.innerHTML = '<i class="fa-solid fa-eye"></i>';
            }
        }
    </script>

    <script type="module" src="index.js"></script>

    <!-- Forgot Password Modal -->
    <div id="forgot-password-modal" class="modal-overlay" style="display:none;">
        <div class="modal-glass">
            <h2>Reset Password</h2>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
            <form id="forgot-password-form">
                <input type="email" id="reset-email" placeholder="Email" required autocomplete="username">
                <button type="submit" class="login-btn-modern" id="reset-btn">
                    Send Reset Link
                    <span class="spinner" style="display:none;"></span>
                </button>
                <button type="button" class="login-btn-modern secondary-btn" id="cancel-reset">Cancel</button>
                <p id="reset-message" class="auth-error-modern" role="alert" aria-live="polite"></p>
            </form>
        </div>
    </div>
</body>
</html>
